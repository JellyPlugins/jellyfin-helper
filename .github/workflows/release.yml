name: Release Plugin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
    - "manifest.json"
    - "Jellyfin.Plugin.JellyfinHelper/**"
    - "build.yaml"
    - "Directory.Build.props"

permissions:
  contents: write
  pull-requests: write

env:
  PLUGIN_NAME: JellyfinHelper
  TARGET_ABI: "10.11.0.0"

jobs:
  security-audit:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore
      run: dotnet restore

    - name: Check for vulnerable packages
      run: |
        set -euo pipefail
        echo "## Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
        dotnet list package --vulnerable --include-transitive --format json > vuln-report.json
        cat vuln-report.json
        # Parse JSON output to detect vulnerabilities (SDK-independent, fail-closed)
        VULN_COUNT=$(python3 -c "
        import json, sys
        data = json.load(open('vuln-report.json'))
        count = sum(
            len(pkg.get('vulnerabilities') or [])
            for proj in data.get('projects', [])
            for fw in proj.get('frameworks', [])
            for pkg in (fw.get('topLevelPackages') or []) + (fw.get('transitivePackages') or [])
        )
        print(count)
        ")
        if [ "$VULN_COUNT" -gt 0 ]; then
          echo "::error::Vulnerable NuGet packages detected! Release blocked. ($VULN_COUNT vulnerabilities)"
          echo "âťŚ **Vulnerable packages found â€” release blocked! ($VULN_COUNT vulnerabilities)**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat vuln-report.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "âś… **No vulnerable packages detected.**" >> $GITHUB_STEP_SUMMARY
        fi

  test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        bucket:
          - name: Unit
            filter: "Category!=Performance&Category!=Security"
          - name: Security
            filter: "Category=Security"
          - name: Performance
            filter: "Category=Performance"

    name: "Tests (${{ matrix.bucket.name }})"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: "Run ${{ matrix.bucket.name }} tests"
      run: |
        dotnet test --configuration Release --no-build --verbosity normal \
          --filter "${{ matrix.bucket.filter }}" \
          --logger "trx;LogFileName=${{ matrix.bucket.name }}.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ matrix.bucket.name }}
        path: "**/TestResults/*.trx"
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [security-audit, test]
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Read version from manifest
      run: |
        VERSION=$(jq -r '.[0].versions[0].version' manifest.json)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Check if tag already exists (remote)
      run: |
        if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
          echo "TAG_EXISTS=true" >> $GITHUB_ENV
          echo "::notice::Tag $VERSION already exists â€” skipping build and release."
        else
          echo "TAG_EXISTS=false" >> $GITHUB_ENV
        fi

    - name: Setup .NET
      if: env.TAG_EXISTS == 'false'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore
      if: env.TAG_EXISTS == 'false'
      run: dotnet restore

    - name: Publish plugin
      if: env.TAG_EXISTS == 'false'
      run: |
        dotnet publish Jellyfin.Plugin.JellyfinHelper/Jellyfin.Plugin.JellyfinHelper.csproj \
          -c Release \
          -o ./publish \
          -p:Version=${VERSION} \
          -p:AssemblyVersion=${VERSION} \
          -p:FileVersion=${VERSION} \
          -p:InformationalVersion=${VERSION}

    - name: Read metadata from manifest.json
      if: env.TAG_EXISTS == 'false'
      run: |
        CHANGELOG=$(jq -r '.[0].versions[0].changelog' manifest.json)
        DESCRIPTION=$(jq -r '.[0].description' manifest.json)
        OVERVIEW=$(jq -r '.[0].overview' manifest.json)
        echo "BUILD_CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "$CHANGELOG" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
        echo "BUILD_DESCRIPTION<<EOF" >> $GITHUB_ENV
        echo "$DESCRIPTION" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
        echo "BUILD_OVERVIEW<<EOF" >> $GITHUB_ENV
        echo "$OVERVIEW" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Create release package
      if: env.TAG_EXISTS == 'false'
      run: |
        mkdir package
        cp publish/*.dll package/
        cp publish/logo.png package/ 2>/dev/null || cp media/logo.png package/
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.0000000Z")
        jq -n \
          --arg changelog "$BUILD_CHANGELOG" \
          --arg description "$BUILD_DESCRIPTION" \
          --arg overview "$BUILD_OVERVIEW" \
          --arg targetAbi "$TARGET_ABI" \
          --arg timestamp "$TIMESTAMP" \
          --arg version "$VERSION" \
          '{
            "category": "General",
            "changelog": $changelog,
            "description": $description,
            "guid": "0c737645-5cbb-4bd8-80c7-d377b560aaa4",
            "name": "Jellyfin Helper",
            "overview": $overview,
            "owner": "JellyPlugins",
            "targetAbi": $targetAbi,
            "timestamp": $timestamp,
            "version": $version,
            "status": "Active",
            "autoUpdate": true,
            "imageUrl": "https://raw.githubusercontent.com/JellyPlugins/jellyfin-helper/main/media/logo.png",
            "imagePath": ("/config/plugins/Jellyfin Helper_" + $version + "/logo.png"),
            "assemblies": []
          }' > package/meta.json
        cd package
        zip ../${PLUGIN_NAME}_${VERSION}.zip *

    - name: Upload build artifact
      if: env.TAG_EXISTS == 'false'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PLUGIN_NAME }}_${{ env.VERSION }}
        path: ${{ env.PLUGIN_NAME }}_${{ env.VERSION }}.zip
        retention-days: 5

  release:
    runs-on: ubuntu-latest
    needs: build
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Read version from manifest
      run: |
        VERSION=$(jq -r '.[0].versions[0].version' manifest.json)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Check if tag already exists (remote)
      run: |
        if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
          echo "TAG_EXISTS=true" >> $GITHUB_ENV
          echo "::notice::Tag $VERSION already exists â€” skipping release."
        else
          echo "TAG_EXISTS=false" >> $GITHUB_ENV
        fi

    - name: Install jq and yq
      if: env.TAG_EXISTS == 'false'
      env:
        YQ_VERSION: v4.52.5
      run: |
        sudo apt-get update && sudo apt-get install -y jq
        sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64
        sudo chmod +x /usr/bin/yq

    - name: Read changelog from manifest
      if: env.TAG_EXISTS == 'false'
      run: |
        CHANGELOG=$(jq -r '.[0].versions[0].changelog' manifest.json)
        echo "CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "$CHANGELOG" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Download build artifact
      if: env.TAG_EXISTS == 'false'
      uses: actions/download-artifact@v8
      with:
        name: ${{ env.PLUGIN_NAME }}_${{ env.VERSION }}

    - name: Generate checksums
      if: env.TAG_EXISTS == 'false'
      run: |
        md5sum ${PLUGIN_NAME}_${VERSION}.zip | cut -d ' ' -f1 > checksum_md5.txt
        sha256sum ${PLUGIN_NAME}_${VERSION}.zip | cut -d ' ' -f1 > checksum_sha256.txt
        echo "CHECKSUM=$(cat checksum_md5.txt)" >> $GITHUB_ENV
        echo "CHECKSUM_SHA256=$(cat checksum_sha256.txt)" >> $GITHUB_ENV

    - name: Create tag
      if: env.TAG_EXISTS == 'false'
      run: |
        git tag $VERSION
        git push origin $VERSION

    - name: Create GitHub Release
      if: env.TAG_EXISTS == 'false'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.VERSION }}
        name: v${{ env.VERSION }}
        body: |
          ## Changelog
          ${{ env.CHANGELOG }}

          ## Checksums
          - **MD5:** `${{ env.CHECKSUM }}`
          - **SHA256:** `${{ env.CHECKSUM_SHA256 }}`

          ## Installation
          Download `${{ env.PLUGIN_NAME }}_${{ env.VERSION }}.zip` and extract it into your Jellyfin plugins directory.
        files: |
          ${{ env.PLUGIN_NAME }}_${{ env.VERSION }}.zip
          checksum_sha256.txt

    - name: Update manifest and build.yaml metadata
      if: env.TAG_EXISTS == 'false'
      run: |
        DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${PLUGIN_NAME}_${VERSION}.zip"

        jq --arg checksum "$CHECKSUM" \
           --arg sha256 "$CHECKSUM_SHA256" \
           --arg url "$DOWNLOAD_URL" \
           '
           .[0].versions[0].checksum = $checksum |
           .[0].versions[0].timestamp = (now | todateiso8601) |
           .[0].versions[0].sourceUrl = $url
           ' manifest.json > manifest.tmp

        mv manifest.tmp manifest.json

        yq eval -i '
          .version = strenv(VERSION) |
          .targetAbi = strenv(TARGET_ABI) |
          .framework = "net9.0" |
          .changelog = strenv(CHANGELOG)
        ' build.yaml

        echo "$CHECKSUM" > checksum_md5.txt
        echo "$CHECKSUM_SHA256" > checksum_sha256.txt

    - name: Create metadata update PR
      if: env.TAG_EXISTS == 'false'
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "chore: update release metadata for ${{ env.VERSION }} [skip release]"
        title: "chore: update release metadata for ${{ env.VERSION }}"
        body: |
          Automated PR to update `manifest.json` and `build.yaml` with release metadata for version `${{ env.VERSION }}`.

          - âś… Checksum: `${{ env.CHECKSUM }}`
          - âś… Timestamp: updated
          - âś… Source URL: updated

          This PR was created automatically by the release workflow.
        branch: chore/update-metadata-${{ env.VERSION }}
        delete-branch: true