name: Smoke Test

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "Name of the build artifact to download"
  workflow_dispatch:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "Name of the build artifact to download"
        default: "FiletreeCleaner_test-build"

env:
  PLUGIN_NAME: FiletreeCleaner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}

    - name: Prepare Jellyfin data directory
      run: |
        # Pre-configure Jellyfin so it skips the Startup Wizard entirely.
        # When IsStartupWizardCompleted=true and no users exist, Jellyfin
        # automatically creates a default "admin" user with an empty password.
        mkdir -p jellyfin-data/config
        cat > jellyfin-data/config/system.xml << 'XMLEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <ServerConfiguration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                             xmlns:xsd="http://www.w3.org/2001/XMLSchema">
          <IsStartupWizardCompleted>true</IsStartupWizardCompleted>
        </ServerConfiguration>
        XMLEOF

        # Install the plugin
        mkdir -p jellyfin-data/plugins/FiletreeCleaner
        unzip ${PLUGIN_NAME}_test-build.zip -d jellyfin-data/plugins/FiletreeCleaner/

        echo "Jellyfin data directory prepared:"
        find jellyfin-data -type f

    - name: Start Jellyfin container
      run: |
        docker run -d \
          --name jellyfin-test \
          -p 8096:8096 \
          -v ${{ github.workspace }}/jellyfin-data:/config \
          jellyfin/jellyfin:unstable

    - name: Wait for Jellyfin to be fully ready
      run: |
        echo "Waiting for Jellyfin to become fully ready..."
        for i in $(seq 1 120); do
          # /System/Info/Public is unauthenticated and only available after
          # the server is fully initialized (not during migrations).
          RESPONSE=$(curl -sf http://localhost:8096/System/Info/Public 2>/dev/null || echo "")
          if echo "$RESPONSE" | jq -e '.StartupWizardCompleted == true' > /dev/null 2>&1; then
            VERSION=$(echo "$RESPONSE" | jq -r '.Version')
            echo "✅ Jellyfin $VERSION is ready! (attempt $i)"
            break
          fi
          if [ $i -eq 120 ]; then
            echo "❌ Jellyfin failed to become ready within 240 seconds"
            echo "Last response: $RESPONSE"
            docker logs jellyfin-test
            exit 1
          fi
          sleep 2
        done

    - name: Authenticate
      run: |
        AUTH_HEADER='X-Emby-Authorization: MediaBrowser Client="CI", Device="GitHub Actions", DeviceId="ci-test", Version="1.0.0"'

        # Jellyfin creates a default admin user with empty password when
        # the wizard is pre-completed and no users exist.
        RESPONSE=$(curl -sf -X POST http://localhost:8096/Users/AuthenticateByName \
          -H "Content-Type: application/json" \
          -H "$AUTH_HEADER" \
          -d '{"Username":"admin","Pw":""}')

        TOKEN=$(echo "$RESPONSE" | jq -r '.AccessToken')
        if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
          echo "❌ Authentication failed"
          echo "$RESPONSE" | jq .
          docker logs jellyfin-test 2>&1 | tail -30
          exit 1
        fi

        echo "✅ Authenticated (token: ${TOKEN:0:8}...)"
        echo "TOKEN=$TOKEN" >> $GITHUB_ENV

    - name: Verify plugin is loaded
      run: |
        PLUGINS=$(curl -sf http://localhost:8096/Plugins \
          -H "X-Emby-Authorization: MediaBrowser Client=\"CI\", Device=\"GitHub Actions\", DeviceId=\"ci-test\", Version=\"1.0.0\", Token=\"$TOKEN\"")

        echo "$PLUGINS" | jq '.[] | {Name, Version, Status}'

        if echo "$PLUGINS" | jq -e '.[] | select(.Name == "Jellyfin Cleaner")' > /dev/null 2>&1; then
          echo "✅ Plugin 'Jellyfin Cleaner' is loaded"
        else
          echo "❌ Plugin 'Jellyfin Cleaner' NOT found"
          docker logs jellyfin-test
          exit 1
        fi

    - name: Verify scheduled tasks are registered
      run: |
        TASKS=$(curl -sf http://localhost:8096/ScheduledTasks \
          -H "X-Emby-Authorization: MediaBrowser Client=\"CI\", Device=\"GitHub Actions\", DeviceId=\"ci-test\", Version=\"1.0.0\", Token=\"$TOKEN\"")

        echo "Jellyfin Cleaner tasks:"
        echo "$TASKS" | jq '[.[] | select(.Category == "Jellyfin Cleaner")] | .[] | {Name, Key, State}'

        TASK_COUNT=$(echo "$TASKS" | jq '[.[] | select(.Category == "Jellyfin Cleaner")] | length')
        if [ "$TASK_COUNT" -eq 4 ]; then
          echo "✅ All 4 scheduled tasks registered"
        else
          echo "❌ Expected 4 tasks, found $TASK_COUNT"
          docker logs jellyfin-test
          exit 1
        fi

    - name: Cleanup
      if: always()
      run: |
        docker logs jellyfin-test > jellyfin-logs.txt 2>&1 || true
        docker rm -f jellyfin-test || true

    - name: Upload Jellyfin logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: jellyfin-smoke-test-logs
        path: jellyfin-logs.txt
        retention-days: 7