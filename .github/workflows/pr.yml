name: PR Build & Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PLUGIN_NAME: JellyfinHelper

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal

    - name: Publish plugin
      run: |
        dotnet publish Jellyfin.Plugin.JellyfinHelper/Jellyfin.Plugin.JellyfinHelper.csproj \
          -c Release \
          -o ./publish \
          --no-build

    - name: Create test package
      run: |
        mkdir package
        cp publish/*.dll package/
        cp publish/*.pdb package/ 2>/dev/null || true
        cd package
        zip ../${PLUGIN_NAME}_test-build.zip *

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PLUGIN_NAME }}_test-build
        path: ${{ env.PLUGIN_NAME }}_test-build.zip
        retention-days: 14

  # Deploy a live preview of the dashboard demo for this PR
  demo-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare demo site
        shell: pwsh
        run: ./.github/scripts/prepare-demo-site.ps1

      - name: Validate demo entrypoint
        shell: pwsh
        run: |
          if (-not (Test-Path './docs/index.html')) {
            throw 'PR preview requires docs/index.html in the branch being tested.'
          }

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          source-dir: ./docs
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      - name: Add preview URL to job summary
        if: success()
        shell: pwsh
        run: |
          $previewUrl = 'https://jellyplugins.github.io/jellyfin-helper/pr-preview/pr-${{ github.event.pull_request.number }}/'
          @(
            '## PR demo preview'
            ''
            "- Expected URL: $previewUrl"
            '- GitHub Pages must be configured to serve `gh-pages` from the repository root.'
            '- If Pages was just enabled, wait a minute and re-run the workflow once.'
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY

