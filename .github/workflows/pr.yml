name: PR Build & Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PLUGIN_NAME: JellyfinHelper

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal

    - name: Publish plugin
      run: |
        dotnet publish Jellyfin.Plugin.JellyfinHelper/Jellyfin.Plugin.JellyfinHelper.csproj \
          -c Release \
          -o ./publish \
          --no-build

    - name: Create test package
      run: |
        mkdir package
        cp publish/*.dll package/
        cp publish/*.pdb package/ 2>/dev/null || true
        cd package
        zip ../${PLUGIN_NAME}_test-build.zip *

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PLUGIN_NAME }}_test-build
        path: ${{ env.PLUGIN_NAME }}_test-build.zip
        retention-days: 14